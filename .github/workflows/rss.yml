name: Update RSS

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate RSS
        run: |
          python << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          from xml.sax.saxutils import escape
          import time

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          }
          base_url = "https://vechnayamolodost.ru"
          
          try:
              response = requests.get(base_url, headers=headers, timeout=15)
              response.raise_for_status()
              soup = BeautifulSoup(response.text, "html.parser")
          except Exception as e:
              print(f"Error fetching main page: {e}")
              exit(1)

          seen = set()
          items = []
          links = soup.select('a[href*="/news/"]')
          
          for a in links:
              if len(items) >= 20:
                  break
                  
              title = a.get_text(strip=True)
              href = a.get("href")

              if not title or not href:
                  continue
              if href.startswith("/"):
                  href = base_url + href
              if href in seen:
                  continue
              seen.add(href)
              
              time.sleep(1)
              desc = ""
              try:
                  art_res = requests.get(href, headers=headers, timeout=10)
                  art_soup = BeautifulSoup(art_res.text, "html.parser")
                  
                  # Удаляем мусорные элементы из структуры страницы перед поиском текста
                  for trash in art_soup.find_all(['nav', 'header', 'footer', 'script', 'style', 'aside']):
                      trash.decompose()

                  # Ищем заголовок, текст новости обычно идет в том же контейнере после него
                  article_title = art_soup.find('h1')
                  if article_title:
                      parent = article_title.find_parent()
                      # Собираем абзацы, которые длиннее 20 символов
                      paragraphs = [p.get_text(strip=True) for p in parent.find_all('p') if len(p.get_text(strip=True)) > 20]
                      full_text = " ".join(paragraphs)
                      if len(full_text) > 10:
                          desc = full_text[:500] + "..."
                  
                  # Запасной вариант по классу контента
                  if not desc:
                      content = art_soup.find('div', class_='text')
                      if content:
                          desc = content.get_text(" ", strip=True)[:450] + "..."
              except:
                  pass

              if desc:
                  # Формируем дату в формате RSS (RFC 822)
                  pub_date = time.strftime("%a, %d %b %Y %H:%M:%S +0000", time.gmtime())
                  
                  items.append(f"""
              <item>
                <title>{escape(title)}</title>
                <link>{escape(href)}</link>
                <description><![CDATA[{desc}]]></description>
                <guid isPermaLink="true">{escape(href)}</guid>
                <pubDate>{pub_date}</pubDate>
              </item>""")

          rss = f'''<?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0" xmlns:atom="http://w3.org">
            <channel>
              <title>Вечная молодость</title>
              <link>{base_url}</link>
              <description>Новости науки и медицины</description>
              <language>ru</language>
              {''.join(items)}
            </channel>
          </rss>'''

          with open("feed.xml", "w", encoding="utf-8") as f:
              f.write(rss)
          EOF

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add feed.xml
          git commit -m "Full RSS update with CDATA and GUID" || echo "No changes to commit"
          git push
