name: Update RSS

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate RSS
        run: |
          python << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          from xml.sax.saxutils import escape
          import time

          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"}
          base_url = "https://vechnayamolodost.ru"
          
          try:
              response = requests.get(base_url, headers=headers, timeout=15)
              response.raise_for_status()
              soup = BeautifulSoup(response.text, "html.parser")
          except Exception as e:
              print(f"Error fetching main page: {e}")
              exit(1)

          seen = set()
          items = []

          # Находим ссылки на новости
          links = soup.select('a[href*="/news/"]')
          
          for a in links:
              if len(items) >= 20: # Ограничим до 20 последних, чтобы не спамить запросами
                  break
                  
              title = a.get_text(strip=True)
              href = a.get("href")

              if not title or not href:
                  continue
              if href.startswith("/"):
                  href = base_url + href
              if href in seen:
                  continue

              seen.add(href)
              
              # Небольшая пауза, чтобы сайт не заблокировал
              time.sleep(1) 

              desc = ""
              try:
                  art_res = requests.get(href, headers=headers, timeout=10)
                  art_soup = BeautifulSoup(art_res.text, "html.parser")
                  # Пытаемся взять текст именно из контента статьи (обычно это тег <article> или класс)
                  text_blocks = art_soup.get_text(" ", strip=True).split()
                  candidate = " ".join(text_blocks[:60])
                  if len(candidate) > 80:
                      desc = candidate + "..."
              except:
                  pass

              items.append(f"""
              <item>
                <title>{escape(title)}</title>
                <link>{escape(href)}</link>
                <description>{escape(desc)}</description>
              </item>
              """)

          rss = f'''<?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0">
            <channel>
              <title>Вечная молодость</title>
              <link>{base_url}</link>
              <description>Новости науки и медицины</description>
              {''.join(items)}
            </channel>
          </rss>'''

          with open("feed.xml", "w", encoding="utf-8") as f:
              f.write(rss)
          EOF

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add feed.xml
          git commit -m "Update RSS" || echo "No changes to commit"
          git push
