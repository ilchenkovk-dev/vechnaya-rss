name: Update RSS

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate RSS
        run: |
          python << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          from xml.sax.saxutils import escape
          import time

          # Заголовки, чтобы сайт не блокировал скрипт
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          }
          base_url = "https://vechnayamolodost.ru"
          
          try:
              response = requests.get(base_url, headers=headers, timeout=15)
              response.raise_for_status()
              soup = BeautifulSoup(response.text, "html.parser")
          except Exception as e:
              print(f"Error fetching main page: {e}")
              exit(1)

          seen = set()
          items = []

          # Ищем ссылки на новости
          links = soup.select('a[href*="/news/"]')
          
          for a in links:
              if len(items) >= 20:  # Ограничим до 20 последних записей
                  break
                  
              title = a.get_text(strip=True)
              href = a.get("href")

              if not title or not href:
                  continue
              if href.startswith("/"):
                  href = base_url + href
              if href in seen:
                  continue

              seen.add(href)
              
              # Пауза 1 сек между запросами, чтобы не забанили
              time.sleep(1)

              desc = ""
              try:
                  art_res = requests.get(href, headers=headers, timeout=10)
                  art_res.raise_for_status()
                  art_soup = BeautifulSoup(art_res.text, "html.parser")
                  
                  # Ищем контент в основном блоке (на этом сайте это часто div с классом text)
                  content_area = art_soup.find('div', class_='text') or art_soup.find('article')
                  
                  if content_area:
                      # Собираем текст из абзацев <p>
                      paragraphs = content_area.find_all('p')
                      if paragraphs:
                          text_parts = [p.get_text(strip=True) for p in paragraphs if p.get_text(strip=True)]
                          full_text = " ".join(text_parts)
                          desc = full_text[:400] + "..." if len(full_text) > 400 else full_text
                      else:
                          # Если абзацев нет, просто берем очищенный текст
                          raw_text = content_area.get_text(" ", strip=True)
                          desc = raw_text[:350] + "..."
              except Exception as e:
                  print(f"Could not fetch description for {href}: {e}")

              items.append(f"""
              <item>
                <title>{escape(title)}</title>
                <link>{escape(href)}</link>
                <description>{escape(desc)}</description>
              </item>
              """)

          rss = f'''<?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0">
            <channel>
              <title>Вечная молодость</title>
              <link>{base_url}</link>
              <description>Новости науки и долголетия</description>
              {''.join(items)}
            </channel>
          </rss>'''

          with open("feed.xml", "w", encoding="utf-8") as f:
              f.write(rss)
          EOF

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add feed.xml
          git commit -m "Update RSS content" || echo "No changes to commit"
          git push
