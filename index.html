<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>RSS generator</title>
</head>
<body>
<script>
async function buildRSS() {
  const url = "https://www.vechnayamolodost.ru/news/";
  const res = await fetch(url);
  const html = await res.text();

  const doc = new DOMParser().parseFromString(html, "text/html");
  const links = [...doc.querySelectorAll('a[href*="/news/"]')];

  const items = links.map(a => {
    const title = a.textContent.trim();
    const link = "https://www.vechnayamolodost.ru" + a.getAttribute("href");
    return `
      <item>
        <title>${title}</title>
        <link>${link}</link>
      </item>`;
  }).join("");

  const rss =
`<?xml version="1.0" encoding="UTF-8" ?>
<rss version="2.0">
<channel>
<title>Vechnaya Molodost</title>
<link>https://www.vechnayamolodost.ru/news/</link>
<description>RSS feed</description>
${items}
</channel>
</rss>`;

  document.body.innerHTML = "<pre>" + rss.replace(/</g,"&lt;") + "</pre>";
}

buildRSS();
</script>
</body>
</html>
